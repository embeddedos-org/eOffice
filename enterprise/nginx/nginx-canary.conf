# eOffice Production — Canary Rollout (10% traffic to v2.0.0)
# Strategy: weighted upstream splits traffic between stable and canary
#
# Usage:
#   1. Start stable on port 3001: PM2/Docker with current production version
#   2. Start canary on port 3002: PM2/Docker with v2.0.0
#   3. Replace nginx.conf with this file and reload: nginx -s reload
#   4. Monitor canary via /metrics and logs
#   5. To promote: update stable to v2.0.0, remove canary, restore nginx.conf
#   6. To rollback: stop canary, restore nginx.conf, reload nginx

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format canary '$remote_addr [$time_local] "$request" $status '
                      '$body_bytes_sent rt=$request_time '
                      'upstream=$upstream_addr canary=$upstream_http_x_canary';
    access_log /var/log/nginx/access.log canary;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 50m;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

    # =============================================
    # CANARY UPSTREAM — 10% to canary, 90% to stable
    # =============================================
    upstream eoffice_canary {
        # Stable (current production) — weight 9 (90%)
        server 127.0.0.1:3001 weight=9;

        # Canary (v2.0.0) — weight 1 (10%)
        server 127.0.0.1:3002 weight=1;

        keepalive 32;
    }

    # Dedicated canary-only upstream (for /canary/* testing routes)
    upstream eoffice_canary_only {
        server 127.0.0.1:3002;
        keepalive 8;
    }

    # Dedicated stable-only upstream (for rollback)
    upstream eoffice_stable_only {
        server 127.0.0.1:3001;
        keepalive 8;
    }

    # HTTP -> HTTPS redirect
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name _;

        # TLS
        ssl_certificate /etc/nginx/ssl/eoffice.crt;
        ssl_certificate_key /etc/nginx/ssl/eoffice.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        # Security headers
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;

        # =============================================
        # Health checks — direct to each instance
        # =============================================
        location = /health/stable {
            proxy_pass http://eoffice_stable_only/api/health;
        }
        location = /health/canary {
            proxy_pass http://eoffice_canary_only/api/health;
        }

        # Metrics — direct to each instance
        location = /metrics/stable {
            proxy_pass http://eoffice_stable_only/metrics;
        }
        location = /metrics/canary {
            proxy_pass http://eoffice_canary_only/metrics;
        }

        # =============================================
        # Force canary for testing (cookie-based)
        # Set cookie: curl -b "canary=true" https://...
        # =============================================
        set $backend "eoffice_canary";
        if ($cookie_canary = "true") {
            set $backend "eoffice_canary_only";
        }
        if ($cookie_canary = "false") {
            set $backend "eoffice_stable_only";
        }

        # Auth endpoints — strict rate limiting
        location /api/auth/ {
            limit_req zone=auth burst=3 nodelay;
            proxy_pass http://$backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API — canary routed
        location /api/ {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://$backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # WebSocket — canary routed
        location /ws/ {
            proxy_pass http://$backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400s;
        }

        # Metrics (default) — no auth
        location = /metrics {
            proxy_pass http://$backend/metrics;
        }

        # Static assets
        location /assets/ {
            root /app/static;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location = /service-worker.js {
            root /app/static;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        # SPA fallback
        location / {
            root /app/static;
            try_files $uri $uri/ /index.html;
        }
    }
}

name: Weekly Comprehensive Tests

on:
  schedule:
    - cron: '0 6 * * 0'
  workflow_dispatch:

jobs:
  full-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run all tests with coverage
        run: |
          cd packages/core && pnpm test -- --coverage && cd ../..
          cd packages/server && pnpm test -- --coverage && cd ../..
          cd packages/ebot-client && pnpm test -- --coverage && cd ../..

      - name: Security audit - dependencies
        run: pnpm audit --audit-level=moderate || true

      - name: Check for hardcoded secrets
        run: |
          echo "Scanning for hardcoded secrets..."
          ! grep -rn "password.*=.*['\"][a-zA-Z0-9]" packages/server/src/ apps/*/src/ --include="*.ts" --include="*.tsx" \
            | grep -v "test" | grep -v "passwordHash" | grep -v "req.body" | grep -v "interface" | grep -v "type " \
            | grep -v "placeholder" | grep -v "label" | grep -v "process.env" || true

      - name: Build all apps
        run: |
          for app in email edocs enotes esheets eslides edb edrive econnect eforms esway eplanner launcher; do
            echo "Building $app..."
            cd apps/$app && pnpm build && cd ../..
          done

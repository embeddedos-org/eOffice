<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>eNotes — Digital Notebook</title>
<style>
:root {
  --bg-primary: #ffffff;
  --bg-secondary: #f5f6f8;
  --bg-tertiary: #ebedf0;
  --bg-hover: #e4e6ea;
  --bg-selected: #e7f3ff;
  --text-primary: #1c1e21;
  --text-secondary: #606770;
  --text-muted: #8a8d91;
  --border-color: #dadde1;
  --accent: #1877f2;
  --accent-hover: #166fe5;
  --accent-light: #e7f3ff;
  --danger: #e4405f;
  --danger-hover: #d0294e;
  --success: #42b72a;
  --warning: #f7b928;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.1);
  --shadow-md: 0 2px 8px rgba(0,0,0,0.15);
  --shadow-lg: 0 4px 16px rgba(0,0,0,0.2);
  --radius-sm: 6px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --font-mono: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
  --panel-width: 300px;
  --divider-width: 4px;
  --ebot-height: 280px;
  --transition-fast: 0.15s ease;
  --transition-normal: 0.25s ease;
  --scrollbar-thumb: #c1c1c1;
  --scrollbar-track: transparent;
  --tag-opacity: 0.15;
}

[data-theme="dark"] {
  --bg-primary: #18191a;
  --bg-secondary: #242526;
  --bg-tertiary: #3a3b3c;
  --bg-hover: #3a3b3c;
  --bg-selected: #263951;
  --text-primary: #e4e6eb;
  --text-secondary: #b0b3b8;
  --text-muted: #8a8d91;
  --border-color: #3e4042;
  --accent: #2d88ff;
  --accent-hover: #1a7aff;
  --accent-light: #263951;
  --danger: #f3425f;
  --danger-hover: #e4405f;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
  --shadow-md: 0 2px 8px rgba(0,0,0,0.4);
  --shadow-lg: 0 4px 16px rgba(0,0,0,0.5);
  --scrollbar-thumb: #4e4f50;
}

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  height: 100%;
  overflow: hidden;
}

body {
  font-family: var(--font-sans);
  background: var(--bg-primary);
  color: var(--text-primary);
  transition: background var(--transition-normal), color var(--transition-normal);
}

::-webkit-scrollbar {
  width: 6px;
  height: 6px;
}
::-webkit-scrollbar-track {
  background: var(--scrollbar-track);
}
::-webkit-scrollbar-thumb {
  background: var(--scrollbar-thumb);
  border-radius: 3px;
}
::-webkit-scrollbar-thumb:hover {
  background: var(--text-muted);
}

.app-container {
  display: flex;
  height: 100vh;
  width: 100vw;
  overflow: hidden;
}

/* LEFT PANEL */
.left-panel {
  width: var(--panel-width);
  min-width: 240px;
  max-width: 500px;
  background: var(--bg-secondary);
  border-right: 1px solid var(--border-color);
  display: flex;
  flex-direction: column;
  transition: width var(--transition-normal);
  position: relative;
  z-index: 10;
}

.panel-header {
  padding: 16px;
  border-bottom: 1px solid var(--border-color);
  flex-shrink: 0;
}

.panel-header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.app-title {
  font-size: 20px;
  font-weight: 700;
  color: var(--text-primary);
  display: flex;
  align-items: center;
  gap: 6px;
  user-select: none;
}

.header-actions {
  display: flex;
  align-items: center;
  gap: 6px;
}

.icon-btn {
  width: 32px;
  height: 32px;
  border: none;
  background: transparent;
  border-radius: var(--radius-sm);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-secondary);
  font-size: 16px;
  transition: all var(--transition-fast);
}
.icon-btn:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
}
.icon-btn.accent {
  background: var(--accent);
  color: #fff;
}
.icon-btn.accent:hover {
  background: var(--accent-hover);
}

.search-container {
  position: relative;
}
.search-container input {
  width: 100%;
  padding: 8px 12px 8px 32px;
  border: 1px solid var(--border-color);
  border-radius: var(--radius-md);
  background: var(--bg-primary);
  color: var(--text-primary);
  font-size: 13px;
  outline: none;
  transition: border-color var(--transition-fast);
}
.search-container input:focus {
  border-color: var(--accent);
}
.search-container .search-icon {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  font-size: 13px;
  pointer-events: none;
}

.note-count {
  padding: 8px 16px 4px;
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  flex-shrink: 0;
}

.note-list {
  flex: 1;
  overflow-y: auto;
  padding: 4px 8px;
}

.note-item {
  padding: 10px 12px;
  border-radius: var(--radius-md);
  cursor: pointer;
  border-left: 3px solid transparent;
  margin-bottom: 2px;
  transition: all var(--transition-fast);
  position: relative;
}
.note-item:hover {
  background: var(--bg-hover);
}
.note-item.selected {
  background: var(--bg-selected);
  border-left-color: var(--accent);
}
.note-item-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 2px;
  display: flex;
  align-items: center;
  gap: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.note-item-title .pin-icon {
  font-size: 12px;
  flex-shrink: 0;
}
.note-item-preview {
  font-size: 12px;
  color: var(--text-muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 4px;
}
.note-item-meta {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}
.note-item-date {
  font-size: 11px;
  color: var(--text-muted);
}
.note-item-tags {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}

.tag-pill {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  padding: 1px 7px;
  border-radius: 10px;
  font-size: 10px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity var(--transition-fast);
  white-space: nowrap;
}
.tag-pill:hover {
  opacity: 0.8;
}
.tag-pill .tag-remove {
  font-size: 12px;
  line-height: 1;
  cursor: pointer;
  margin-left: 2px;
  opacity: 0.6;
}
.tag-pill .tag-remove:hover {
  opacity: 1;
}

.panel-footer {
  padding: 12px 16px;
  border-top: 1px solid var(--border-color);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.panel-footer a {
  color: var(--text-muted);
  text-decoration: none;
  font-size: 12px;
  transition: color var(--transition-fast);
}
.panel-footer a:hover {
  color: var(--accent);
}

.footer-actions {
  display: flex;
  gap: 4px;
}

/* DIVIDER */
.panel-divider {
  width: var(--divider-width);
  background: var(--border-color);
  cursor: col-resize;
  flex-shrink: 0;
  transition: background var(--transition-fast);
  position: relative;
  z-index: 11;
}
.panel-divider:hover, .panel-divider.dragging {
  background: var(--accent);
}

/* RIGHT PANEL */
.right-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: var(--bg-primary);
  min-width: 0;
  position: relative;
}

.editor-container {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.editor-header {
  padding: 20px 28px 0;
  flex-shrink: 0;
}

.title-input {
  width: 100%;
  border: none;
  background: transparent;
  font-size: 28px;
  font-weight: 700;
  color: var(--text-primary);
  outline: none;
  padding: 0;
  margin-bottom: 12px;
}
.title-input::placeholder {
  color: var(--text-muted);
}

.tag-bar {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 6px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border-color);
  min-height: 32px;
}
.tag-input {
  border: none;
  background: transparent;
  font-size: 13px;
  color: var(--text-primary);
  outline: none;
  min-width: 80px;
  flex: 1;
}
.tag-input::placeholder {
  color: var(--text-muted);
}

.editor-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 28px;
  border-bottom: 1px solid var(--border-color);
  flex-shrink: 0;
}

.toolbar-left {
  display: flex;
  align-items: center;
  gap: 8px;
}

.toolbar-right {
  display: flex;
  align-items: center;
  gap: 4px;
}

.toolbar-btn {
  padding: 4px 10px;
  border: 1px solid var(--border-color);
  border-radius: var(--radius-sm);
  background: var(--bg-secondary);
  color: var(--text-secondary);
  font-size: 12px;
  cursor: pointer;
  transition: all var(--transition-fast);
}
.toolbar-btn:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
}
.toolbar-btn.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}

.last-modified {
  font-size: 11px;
  color: var(--text-muted);
}

.editor-content {
  flex: 1;
  overflow-y: auto;
  padding: 16px 28px 20px;
}

.content-textarea {
  width: 100%;
  min-height: 200px;
  border: none;
  background: transparent;
  color: var(--text-primary);
  font-size: 15px;
  line-height: 1.7;
  resize: none;
  outline: none;
  font-family: var(--font-sans);
}
.content-textarea.monospace {
  font-family: var(--font-mono);
  font-size: 14px;
}
.content-textarea::placeholder {
  color: var(--text-muted);
}

/* EMPTY STATE */
.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: var(--text-muted);
  gap: 12px;
  padding: 40px;
}
.empty-state .empty-icon {
  font-size: 48px;
  opacity: 0.5;
}
.empty-state p {
  font-size: 14px;
  text-align: center;
}

/* eBOT PANEL */
.ebot-panel {
  border-top: 1px solid var(--border-color);
  background: var(--bg-secondary);
  flex-shrink: 0;
  transition: max-height 0.3s ease;
  overflow: hidden;
  max-height: 40px;
}
.ebot-panel.expanded {
  max-height: 400px;
}

.ebot-toggle {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 16px;
  cursor: pointer;
  user-select: none;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  transition: background var(--transition-fast);
}
.ebot-toggle:hover {
  background: var(--bg-hover);
}
.ebot-toggle .chevron {
  transition: transform 0.3s ease;
  font-size: 12px;
}
.ebot-panel.expanded .ebot-toggle .chevron {
  transform: rotate(180deg);
}

.ebot-body {
  padding: 12px 16px;
}

.ebot-actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 12px;
}

.ebot-btn {
  padding: 6px 14px;
  border: 1px solid var(--border-color);
  border-radius: var(--radius-md);
  background: var(--bg-primary);
  color: var(--text-primary);
  font-size: 12px;
  cursor: pointer;
  transition: all var(--transition-fast);
  display: flex;
  align-items: center;
  gap: 4px;
}
.ebot-btn:hover {
  border-color: var(--accent);
  background: var(--accent-light);
  color: var(--accent);
}
.ebot-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.ebot-response {
  background: var(--bg-primary);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-md);
  padding: 12px;
  font-size: 13px;
  line-height: 1.6;
  color: var(--text-secondary);
  max-height: 180px;
  overflow-y: auto;
  white-space: pre-wrap;
}
.ebot-response.empty {
  color: var(--text-muted);
  font-style: italic;
}

/* CONTEXT MENU */
.context-menu {
  position: fixed;
  background: var(--bg-primary);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-lg);
  z-index: 1000;
  min-width: 160px;
  padding: 4px;
  display: none;
}
.context-menu.visible {
  display: block;
}
.context-menu-item {
  padding: 8px 12px;
  font-size: 13px;
  cursor: pointer;
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--text-primary);
  transition: background var(--transition-fast);
}
.context-menu-item:hover {
  background: var(--bg-hover);
}
.context-menu-item.danger {
  color: var(--danger);
}
.context-menu-item.danger:hover {
  background: rgba(228, 64, 95, 0.1);
}

/* MODAL */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 2000;
  opacity: 0;
  visibility: hidden;
  transition: all var(--transition-normal);
}
.modal-overlay.visible {
  opacity: 1;
  visibility: visible;
}
.modal {
  background: var(--bg-primary);
  border-radius: var(--radius-lg);
  padding: 24px;
  min-width: 320px;
  max-width: 420px;
  box-shadow: var(--shadow-lg);
  transform: scale(0.95);
  transition: transform var(--transition-normal);
}
.modal-overlay.visible .modal {
  transform: scale(1);
}
.modal h3 {
  font-size: 16px;
  margin-bottom: 8px;
}
.modal p {
  font-size: 14px;
  color: var(--text-secondary);
  margin-bottom: 20px;
}
.modal-actions {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
}
.modal-btn {
  padding: 8px 18px;
  border: 1px solid var(--border-color);
  border-radius: var(--radius-sm);
  font-size: 13px;
  cursor: pointer;
  transition: all var(--transition-fast);
  background: var(--bg-secondary);
  color: var(--text-primary);
}
.modal-btn:hover {
  background: var(--bg-hover);
}
.modal-btn.danger {
  background: var(--danger);
  color: #fff;
  border-color: var(--danger);
}
.modal-btn.danger:hover {
  background: var(--danger-hover);
}

/* THEME TOGGLE */
.theme-toggle {
  position: relative;
}

/* MOBILE TOGGLE */
.mobile-back-btn {
  display: none;
  padding: 8px 12px;
  background: var(--bg-secondary);
  border: none;
  border-bottom: 1px solid var(--border-color);
  color: var(--accent);
  font-size: 13px;
  cursor: pointer;
  width: 100%;
  text-align: left;
}

/* TOAST */
.toast {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: var(--text-primary);
  color: var(--bg-primary);
  padding: 10px 18px;
  border-radius: var(--radius-md);
  font-size: 13px;
  box-shadow: var(--shadow-md);
  z-index: 3000;
  opacity: 0;
  transform: translateY(10px);
  transition: all 0.3s ease;
  pointer-events: none;
}
.toast.visible {
  opacity: 1;
  transform: translateY(0);
}

/* HIGHLIGHT */
mark.search-highlight {
  background: var(--warning);
  color: #000;
  padding: 0 2px;
  border-radius: 2px;
}

/* IMPORT INPUT */
.import-input {
  display: none;
}

/* RESPONSIVE */
@media (max-width: 768px) {
  .left-panel {
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 100% !important;
    max-width: 100% !important;
    z-index: 20;
    transition: transform 0.3s ease;
  }
  .left-panel.hidden-mobile {
    transform: translateX(-100%);
  }
  .panel-divider {
    display: none;
  }
  .mobile-back-btn {
    display: block;
  }
  .right-panel {
    width: 100%;
  }
}

/* ANIMATIONS */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}
.note-item {
  animation: fadeIn 0.2s ease;
}

/* Keyboard shortcut hints */
.shortcut-hint {
  font-size: 10px;
  color: var(--text-muted);
  background: var(--bg-tertiary);
  padding: 1px 5px;
  border-radius: 3px;
  margin-left: auto;
  font-family: var(--font-mono);
}
</style>
</head>
<body>

<div class="app-container" id="app">
  <!-- LEFT PANEL -->
  <div class="left-panel" id="leftPanel">
    <div class="panel-header">
      <div class="panel-header-top">
        <div class="app-title">📒 eNotes</div>
        <div class="header-actions">
          <button class="icon-btn" id="themeToggle" title="Toggle dark/light mode">🌙</button>
          <button class="icon-btn accent" id="newNoteBtn" title="New Note (Ctrl+N)">+</button>
        </div>
      </div>
      <div class="search-container">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Search notes..." autocomplete="off">
      </div>
    </div>

    <div class="note-count" id="noteCount">0 notes</div>
    <div class="note-list" id="noteList"></div>

    <div class="panel-footer">
      <a href="index.html">← Back to eOffice</a>
      <div class="footer-actions">
        <button class="icon-btn" id="importBtn" title="Import notes">📥</button>
        <button class="icon-btn" id="exportBtn" title="Export notes">📤</button>
      </div>
    </div>
    <input type="file" class="import-input" id="importInput" accept=".json">
  </div>

  <!-- DIVIDER -->
  <div class="panel-divider" id="panelDivider"></div>

  <!-- RIGHT PANEL -->
  <div class="right-panel" id="rightPanel">
    <button class="mobile-back-btn" id="mobileBackBtn">← Back to notes</button>

    <!-- EMPTY STATE -->
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">📝</div>
      <p>Select a note or create a new one<br><small>Ctrl+N to create</small></p>
    </div>

    <!-- EDITOR -->
    <div class="editor-container" id="editorContainer" style="display:none;">
      <div class="editor-header">
        <input type="text" class="title-input" id="titleInput" placeholder="Note title...">
        <div class="tag-bar" id="tagBar">
          <input type="text" class="tag-input" id="tagInput" placeholder="Add tag...">
        </div>
      </div>
      <div class="editor-toolbar">
        <div class="toolbar-left">
          <span class="last-modified" id="lastModified"></span>
        </div>
        <div class="toolbar-right">
          <button class="toolbar-btn" id="monoToggle" title="Toggle monospace">Mono</button>
        </div>
      </div>
      <div class="editor-content">
        <textarea class="content-textarea" id="contentTextarea" placeholder="Start writing..."></textarea>
      </div>

      <!-- eBOT PANEL -->
      <div class="ebot-panel" id="ebotPanel">
        <div class="ebot-toggle" id="ebotToggle">
          <span>🤖 eBot AI</span>
          <span class="chevron">▲</span>
        </div>
        <div class="ebot-body">
          <div class="ebot-actions">
            <button class="ebot-btn" data-action="summarize">📝 Summarize</button>
            <button class="ebot-btn" data-action="auto-tag">🏷️ Auto-Tag</button>
            <button class="ebot-btn" data-action="extract-tasks">✅ Extract Tasks</button>
            <button class="ebot-btn" data-action="find-related">🔗 Find Related</button>
          </div>
          <div class="ebot-response empty" id="ebotResponse">eBot responses will appear here...</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- CONTEXT MENU -->
<div class="context-menu" id="contextMenu">
  <div class="context-menu-item" data-action="pin"><span>📌</span> Pin/Unpin</div>
  <div class="context-menu-item danger" data-action="delete"><span>🗑️</span> Delete</div>
</div>

<!-- DELETE MODAL -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal">
    <h3>Delete Note</h3>
    <p>Are you sure you want to delete this note? This action cannot be undone.</p>
    <div class="modal-actions">
      <button class="modal-btn" id="cancelDelete">Cancel</button>
      <button class="modal-btn danger" id="confirmDelete">Delete</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
(() => {
  'use strict';

  const STORAGE_KEY = 'enotes_data';
  const THEME_KEY = 'enotes_theme';
  const DEBOUNCE_MS = 500;
  const EBOT_BASE = 'http://localhost:3001/api/ebot';

  // UUID generator
  function uuid() {
    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
      const r = Math.random() * 16 | 0;
      return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
    });
  }

  // Relative time
  function relativeTime(dateStr) {
    const now = Date.now();
    const then = new Date(dateStr).getTime();
    const diff = Math.max(0, now - then);
    const seconds = Math.floor(diff / 1000);
    if (seconds < 60) return 'just now';
    const minutes = Math.floor(seconds / 60);
    if (minutes < 60) return `${minutes} min ago`;
    const hours = Math.floor(minutes / 60);
    if (hours < 24) return `${hours} hour${hours > 1 ? 's' : ''} ago`;
    const days = Math.floor(hours / 24);
    if (days < 30) return `${days} day${days > 1 ? 's' : ''} ago`;
    const months = Math.floor(days / 30);
    return `${months} month${months > 1 ? 's' : ''} ago`;
  }

  // Tag color from string hash
  const TAG_COLORS = [
    { bg: '#e3f2fd', fg: '#1565c0' },
    { bg: '#fce4ec', fg: '#c62828' },
    { bg: '#e8f5e9', fg: '#2e7d32' },
    { bg: '#fff3e0', fg: '#e65100' },
    { bg: '#f3e5f5', fg: '#7b1fa2' },
    { bg: '#e0f7fa', fg: '#00838f' },
    { bg: '#fff8e1', fg: '#f9a825' },
    { bg: '#fbe9e7', fg: '#d84315' },
    { bg: '#e8eaf6', fg: '#283593' },
    { bg: '#e0f2f1', fg: '#00695c' },
    { bg: '#f1f8e9', fg: '#558b2f' },
    { bg: '#ede7f6', fg: '#4527a0' },
  ];

  function tagColor(tag) {
    let hash = 0;
    for (let i = 0; i < tag.length; i++) hash = ((hash << 5) - hash) + tag.charCodeAt(i);
    const idx = Math.abs(hash) % TAG_COLORS.length;
    return TAG_COLORS[idx];
  }

  // Sample notes
  function sampleNotes() {
    const now = new Date().toISOString();
    return [
      {
        id: uuid(),
        title: 'Welcome to eNotes',
        content: 'Welcome to eNotes — your digital notebook!\n\nFeatures:\n• Create, edit, and delete notes\n• Tag your notes for easy organization\n• Pin important notes to the top\n• Search across all your notes\n• Dark/Light mode\n• Export and import your notes as JSON\n• Keyboard shortcuts: Ctrl+N (new), Ctrl+F (search), Ctrl+Delete (delete)\n\nAll your notes are saved locally in your browser. Start writing!',
        tags: ['welcome', 'guide'],
        created_at: now,
        updated_at: now,
        pinned: true
      },
      {
        id: uuid(),
        title: 'Meeting Notes Template',
        content: '# Meeting Notes\n\nDate: \nAttendees: \n\n## Agenda\n1. \n2. \n3. \n\n## Discussion Points\n- \n\n## Action Items\n- [ ] \n- [ ] \n\n## Next Steps\n- ',
        tags: ['meeting', 'template'],
        created_at: new Date(Date.now() - 3600000).toISOString(),
        updated_at: new Date(Date.now() - 3600000).toISOString(),
        pinned: false
      },
      {
        id: uuid(),
        title: 'Quick Tips',
        content: '💡 Quick Tips for eNotes:\n\n1. Use Ctrl+N to quickly create a new note\n2. Press Ctrl+F to jump to the search bar\n3. Add tags by typing in the tag bar and pressing Enter or comma\n4. Click a tag in the sidebar to filter notes by that tag\n5. Right-click a note for pin/delete options\n6. Toggle monospace font for code-heavy notes\n7. Use the eBot AI panel for smart suggestions\n8. Export your notes regularly as a backup',
        tags: ['tips', 'productivity'],
        created_at: new Date(Date.now() - 7200000).toISOString(),
        updated_at: new Date(Date.now() - 7200000).toISOString(),
        pinned: false
      }
    ];
  }

  // State
  let notes = [];
  let selectedNoteId = null;
  let contextMenuNoteId = null;
  let deleteTargetId = null;
  let searchQuery = '';
  let filterTag = null;
  let saveTimer = null;
  let isMonospace = false;
  let isMobileListVisible = true;

  // DOM refs
  const $ = id => document.getElementById(id);
  const noteList = $('noteList');
  const noteCount = $('noteCount');
  const searchInput = $('searchInput');
  const titleInput = $('titleInput');
  const contentTextarea = $('contentTextarea');
  const tagInput = $('tagInput');
  const tagBar = $('tagBar');
  const lastModified = $('lastModified');
  const emptyState = $('emptyState');
  const editorContainer = $('editorContainer');
  const contextMenu = $('contextMenu');
  const deleteModal = $('deleteModal');
  const ebotPanel = $('ebotPanel');
  const ebotResponse = $('ebotResponse');
  const toast = $('toast');
  const leftPanel = $('leftPanel');
  const panelDivider = $('panelDivider');

  // Load / Save
  function loadNotes() {
    try {
      const data = localStorage.getItem(STORAGE_KEY);
      notes = data ? JSON.parse(data) : sampleNotes();
    } catch {
      notes = sampleNotes();
    }
  }

  function saveNotes() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
  }

  // Theme
  function loadTheme() {
    const theme = localStorage.getItem(THEME_KEY) || 'light';
    document.documentElement.setAttribute('data-theme', theme);
    $('themeToggle').textContent = theme === 'dark' ? '☀️' : '🌙';
  }

  function toggleTheme() {
    const current = document.documentElement.getAttribute('data-theme');
    const next = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem(THEME_KEY, next);
    $('themeToggle').textContent = next === 'dark' ? '☀️' : '🌙';
  }

  // Toast
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('visible');
    setTimeout(() => toast.classList.remove('visible'), 2000);
  }

  // Highlight search matches
  function highlightText(text, query) {
    if (!query) return escapeHtml(text);
    const escaped = escapeHtml(text);
    const regex = new RegExp(`(${escapeRegex(query)})`, 'gi');
    return escaped.replace(regex, '<mark class="search-highlight">$1</mark>');
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function escapeRegex(str) {
    return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  }

  // Render note list
  function renderNoteList() {
    let filtered = [...notes];

    if (filterTag) {
      filtered = filtered.filter(n => n.tags.includes(filterTag));
    }

    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      filtered = filtered.filter(n =>
        n.title.toLowerCase().includes(q) ||
        n.content.toLowerCase().includes(q) ||
        n.tags.some(t => t.toLowerCase().includes(q))
      );
    }

    // Sort: pinned first, then by updated_at desc
    filtered.sort((a, b) => {
      if (a.pinned !== b.pinned) return a.pinned ? -1 : 1;
      return new Date(b.updated_at) - new Date(a.updated_at);
    });

    const countLabel = filterTag
      ? `${filtered.length} note${filtered.length !== 1 ? 's' : ''} tagged "${filterTag}" <span style="cursor:pointer;color:var(--accent)" onclick="window._clearFilter()">✕ clear</span>`
      : `${filtered.length} note${filtered.length !== 1 ? 's' : ''}`;
    noteCount.innerHTML = countLabel;

    noteList.innerHTML = '';
    if (filtered.length === 0) {
      noteList.innerHTML = `<div style="padding:20px;text-align:center;color:var(--text-muted);font-size:13px;">No notes found</div>`;
      return;
    }

    filtered.forEach(note => {
      const item = document.createElement('div');
      item.className = `note-item${note.id === selectedNoteId ? ' selected' : ''}`;
      item.dataset.id = note.id;

      const preview = note.content.replace(/\n/g, ' ').slice(0, 60);
      const tagsHtml = note.tags.map(t => {
        const c = tagColor(t);
        return `<span class="tag-pill" data-tag="${escapeHtml(t)}" style="background:${c.bg};color:${c.fg}" onclick="event.stopPropagation();window._filterByTag('${escapeHtml(t)}')">${escapeHtml(t)}</span>`;
      }).join('');

      item.innerHTML = `
        <div class="note-item-title">
          ${note.pinned ? '<span class="pin-icon">📌</span>' : ''}
          <span>${highlightText(note.title || 'Untitled', searchQuery)}</span>
        </div>
        <div class="note-item-preview">${highlightText(preview, searchQuery)}</div>
        <div class="note-item-meta">
          <span class="note-item-date">${relativeTime(note.updated_at)}</span>
          <div class="note-item-tags">${tagsHtml}</div>
        </div>
      `;

      item.addEventListener('click', () => selectNote(note.id));
      item.addEventListener('contextmenu', e => showContextMenu(e, note.id));

      // Long press for mobile
      let longPressTimer;
      item.addEventListener('touchstart', e => {
        longPressTimer = setTimeout(() => showContextMenu(e.touches[0], note.id), 500);
      });
      item.addEventListener('touchend', () => clearTimeout(longPressTimer));
      item.addEventListener('touchmove', () => clearTimeout(longPressTimer));

      noteList.appendChild(item);
    });
  }

  // Select note
  function selectNote(id) {
    selectedNoteId = id;
    const note = notes.find(n => n.id === id);
    if (!note) return;

    emptyState.style.display = 'none';
    editorContainer.style.display = 'flex';

    titleInput.value = note.title;
    contentTextarea.value = note.content;
    lastModified.textContent = `Last modified: ${relativeTime(note.updated_at)}`;

    renderTagBar(note);
    renderNoteList();

    // Reset eBot
    ebotResponse.textContent = 'eBot responses will appear here...';
    ebotResponse.className = 'ebot-response empty';

    // Mobile: hide list, show editor
    if (window.innerWidth <= 768) {
      leftPanel.classList.add('hidden-mobile');
    }

    autoGrowTextarea();
  }

  // Create new note
  function createNote() {
    const note = {
      id: uuid(),
      title: '',
      content: '',
      tags: [],
      created_at: new Date().toISOString(),
      updated_at: new Date().toISOString(),
      pinned: false
    };
    notes.unshift(note);
    saveNotes();
    selectNote(note.id);
    titleInput.focus();
    showToast('New note created');
  }

  // Auto-save with debounce
  function scheduleSave() {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => {
      const note = notes.find(n => n.id === selectedNoteId);
      if (!note) return;
      note.title = titleInput.value;
      note.content = contentTextarea.value;
      note.updated_at = new Date().toISOString();
      saveNotes();
      lastModified.textContent = `Last modified: ${relativeTime(note.updated_at)}`;
      renderNoteList();
    }, DEBOUNCE_MS);
  }

  // Auto-grow textarea
  function autoGrowTextarea() {
    contentTextarea.style.height = 'auto';
    contentTextarea.style.height = Math.max(200, contentTextarea.scrollHeight) + 'px';
  }

  // Tag bar rendering
  function renderTagBar(note) {
    const pills = tagBar.querySelectorAll('.tag-pill');
    pills.forEach(p => p.remove());

    note.tags.forEach(t => {
      const c = tagColor(t);
      const pill = document.createElement('span');
      pill.className = 'tag-pill';
      pill.style.background = c.bg;
      pill.style.color = c.fg;
      pill.innerHTML = `${escapeHtml(t)}<span class="tag-remove">&times;</span>`;
      pill.querySelector('.tag-remove').addEventListener('click', e => {
        e.stopPropagation();
        removeTag(t);
      });
      pill.addEventListener('click', e => {
        e.stopPropagation();
        window._filterByTag(t);
      });
      tagBar.insertBefore(pill, tagInput);
    });
  }

  // Add tag
  function addTag(tagName) {
    const tag = tagName.trim().toLowerCase().replace(/[^a-z0-9_-]/g, '');
    if (!tag) return;
    const note = notes.find(n => n.id === selectedNoteId);
    if (!note || note.tags.includes(tag)) return;
    note.tags.push(tag);
    note.updated_at = new Date().toISOString();
    saveNotes();
    renderTagBar(note);
    renderNoteList();
  }

  // Remove tag
  function removeTag(tagName) {
    const note = notes.find(n => n.id === selectedNoteId);
    if (!note) return;
    note.tags = note.tags.filter(t => t !== tagName);
    note.updated_at = new Date().toISOString();
    saveNotes();
    renderTagBar(note);
    renderNoteList();
  }

  // Pin/Unpin
  function togglePin(id) {
    const note = notes.find(n => n.id === id);
    if (!note) return;
    note.pinned = !note.pinned;
    note.updated_at = new Date().toISOString();
    saveNotes();
    renderNoteList();
    showToast(note.pinned ? 'Note pinned' : 'Note unpinned');
  }

  // Delete note
  function deleteNote(id) {
    notes = notes.filter(n => n.id !== id);
    saveNotes();
    if (selectedNoteId === id) {
      selectedNoteId = null;
      editorContainer.style.display = 'none';
      emptyState.style.display = 'flex';
    }
    renderNoteList();
    showToast('Note deleted');
  }

  // Context menu
  function showContextMenu(e, noteId) {
    e.preventDefault();
    contextMenuNoteId = noteId;
    const note = notes.find(n => n.id === noteId);
    const pinItem = contextMenu.querySelector('[data-action="pin"]');
    pinItem.innerHTML = `<span>📌</span> ${note && note.pinned ? 'Unpin' : 'Pin'}`;
    contextMenu.style.left = (e.clientX || e.pageX) + 'px';
    contextMenu.style.top = (e.clientY || e.pageY) + 'px';
    contextMenu.classList.add('visible');
  }

  function hideContextMenu() {
    contextMenu.classList.remove('visible');
    contextMenuNoteId = null;
  }

  // Filter by tag
  window._filterByTag = function(tag) {
    filterTag = tag;
    searchInput.value = '';
    searchQuery = '';
    renderNoteList();
  };

  window._clearFilter = function() {
    filterTag = null;
    renderNoteList();
  };

  // Export notes
  function exportNotes() {
    const data = JSON.stringify(notes, null, 2);
    const blob = new Blob([data], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `enotes_backup_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('Notes exported');
  }

  // Import notes
  function importNotes(file) {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const imported = JSON.parse(e.target.result);
        if (!Array.isArray(imported)) throw new Error('Invalid format');
        imported.forEach(n => {
          if (!n.id) n.id = uuid();
          if (!n.tags) n.tags = [];
          if (!n.created_at) n.created_at = new Date().toISOString();
          if (!n.updated_at) n.updated_at = new Date().toISOString();
          if (typeof n.pinned !== 'boolean') n.pinned = false;
        });
        notes = [...notes, ...imported];
        saveNotes();
        renderNoteList();
        showToast(`Imported ${imported.length} notes`);
      } catch {
        showToast('Invalid JSON file');
      }
    };
    reader.readAsText(file);
  }

  // eBot AI
  async function callEbot(action) {
    const note = notes.find(n => n.id === selectedNoteId);
    if (!note) return;

    ebotResponse.className = 'ebot-response empty';
    ebotResponse.textContent = 'Thinking...';

    const endpoints = {
      'summarize': '/summarize',
      'auto-tag': '/auto-tag',
      'extract-tasks': '/extract-tasks',
      'find-related': '/find-related'
    };

    try {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 5000);

      const res = await fetch(EBOT_BASE + endpoints[action], {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          noteId: note.id,
          title: note.title,
          content: note.content,
          tags: note.tags,
          allNotes: notes.map(n => ({ id: n.id, title: n.title, tags: n.tags }))
        }),
        signal: controller.signal
      });

      clearTimeout(timeoutId);
      const data = await res.json();

      ebotResponse.className = 'ebot-response';
      ebotResponse.textContent = data.result || data.message || JSON.stringify(data, null, 2);

      if (action === 'auto-tag' && data.tags && Array.isArray(data.tags)) {
        data.tags.forEach(t => addTag(t));
        showToast('Tags added by eBot');
      }
    } catch {
      ebotResponse.className = 'ebot-response';
      ebotResponse.textContent = '⚠️ eBot is offline. Start the eBot server at http://localhost:3001 to enable AI features.';
    }
  }

  // Panel divider drag
  function initDividerDrag() {
    let isDragging = false;

    panelDivider.addEventListener('mousedown', e => {
      isDragging = true;
      panelDivider.classList.add('dragging');
      document.body.style.cursor = 'col-resize';
      document.body.style.userSelect = 'none';
      e.preventDefault();
    });

    document.addEventListener('mousemove', e => {
      if (!isDragging) return;
      const newWidth = Math.min(500, Math.max(240, e.clientX));
      leftPanel.style.width = newWidth + 'px';
    });

    document.addEventListener('mouseup', () => {
      if (!isDragging) return;
      isDragging = false;
      panelDivider.classList.remove('dragging');
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
    });
  }

  // Event listeners
  function initEvents() {
    // New note
    $('newNoteBtn').addEventListener('click', createNote);

    // Theme toggle
    $('themeToggle').addEventListener('click', toggleTheme);

    // Search
    searchInput.addEventListener('input', () => {
      searchQuery = searchInput.value;
      renderNoteList();
    });

    // Title input
    titleInput.addEventListener('input', scheduleSave);

    // Content textarea
    contentTextarea.addEventListener('input', () => {
      scheduleSave();
      autoGrowTextarea();
    });

    // Tag input
    tagInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ',') {
        e.preventDefault();
        const val = tagInput.value.replace(/,/g, '');
        addTag(val);
        tagInput.value = '';
      }
      if (e.key === 'Backspace' && tagInput.value === '') {
        const note = notes.find(n => n.id === selectedNoteId);
        if (note && note.tags.length > 0) {
          removeTag(note.tags[note.tags.length - 1]);
        }
      }
    });

    // Monospace toggle
    $('monoToggle').addEventListener('click', () => {
      isMonospace = !isMonospace;
      contentTextarea.classList.toggle('monospace', isMonospace);
      $('monoToggle').classList.toggle('active', isMonospace);
    });

    // eBot toggle
    $('ebotToggle').addEventListener('click', () => {
      ebotPanel.classList.toggle('expanded');
    });

    // eBot action buttons
    document.querySelectorAll('.ebot-btn').forEach(btn => {
      btn.addEventListener('click', () => callEbot(btn.dataset.action));
    });

    // Context menu actions
    contextMenu.querySelectorAll('.context-menu-item').forEach(item => {
      item.addEventListener('click', () => {
        const action = item.dataset.action;
        if (action === 'pin') togglePin(contextMenuNoteId);
        if (action === 'delete') {
          deleteTargetId = contextMenuNoteId;
          deleteModal.classList.add('visible');
        }
        hideContextMenu();
      });
    });

    // Hide context menu on click outside
    document.addEventListener('click', hideContextMenu);

    // Delete modal
    $('cancelDelete').addEventListener('click', () => {
      deleteModal.classList.remove('visible');
      deleteTargetId = null;
    });
    $('confirmDelete').addEventListener('click', () => {
      if (deleteTargetId) deleteNote(deleteTargetId);
      deleteModal.classList.remove('visible');
      deleteTargetId = null;
    });
    deleteModal.addEventListener('click', e => {
      if (e.target === deleteModal) {
        deleteModal.classList.remove('visible');
        deleteTargetId = null;
      }
    });

    // Export
    $('exportBtn').addEventListener('click', exportNotes);

    // Import
    $('importBtn').addEventListener('click', () => $('importInput').click());
    $('importInput').addEventListener('change', e => {
      if (e.target.files[0]) {
        importNotes(e.target.files[0]);
        e.target.value = '';
      }
    });

    // Mobile back button
    $('mobileBackBtn').addEventListener('click', () => {
      leftPanel.classList.remove('hidden-mobile');
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', e => {
      // Ctrl+N: new note
      if (e.ctrlKey && e.key === 'n') {
        e.preventDefault();
        createNote();
      }
      // Ctrl+F: focus search
      if (e.ctrlKey && e.key === 'f') {
        e.preventDefault();
        searchInput.focus();
        searchInput.select();
      }
      // Ctrl+Delete: delete current note
      if (e.ctrlKey && e.key === 'Delete') {
        e.preventDefault();
        if (selectedNoteId) {
          deleteTargetId = selectedNoteId;
          deleteModal.classList.add('visible');
        }
      }
      // Escape: close modals / context menu
      if (e.key === 'Escape') {
        hideContextMenu();
        deleteModal.classList.remove('visible');
        deleteTargetId = null;
      }
    });

    // Divider drag
    initDividerDrag();
  }

  // Initialize
  function init() {
    loadTheme();
    loadNotes();
    renderNoteList();
    initEvents();

    // If notes exist but none selected, show empty state
    if (notes.length > 0) {
      emptyState.style.display = 'flex';
      editorContainer.style.display = 'none';
    }
  }

  init();
})();
</script>
</body>
</html>

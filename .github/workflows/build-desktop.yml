name: Build Desktop Apps
on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: --win
            artifact: windows
          - os: macos-latest
            target: --mac
            artifact: macos
          - os: ubuntu-latest
            target: --linux
            artifact: linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install desktop dependencies
        run: cd desktop && npm install
      - name: Build
        run: cd desktop && npx electron-builder ${{ matrix.target }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - uses: actions/upload-artifact@v4
        with:
          name: eoffice-${{ matrix.artifact }}
          path: |
            desktop/dist/*.exe
            desktop/dist/*.dmg
            desktop/dist/*.zip
            desktop/dist/*.AppImage
            desktop/dist/*.deb

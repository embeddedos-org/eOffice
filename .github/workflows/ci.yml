name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run core tests
        run: cd packages/core && pnpm test

      - name: Run server tests
        run: cd packages/server && pnpm test

      - name: Run ebot-client tests
        run: cd packages/ebot-client && pnpm test

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check for hardcoded secrets
        run: |
          echo "Checking for hardcoded secrets..."
          ! grep -rn "password.*=.*['\"]" packages/server/src/ --include="*.ts" | grep -v "test" | grep -v "passwordHash" | grep -v "req.body" | grep -v "interface" | grep -v "type " || true

      - name: Check for remaining simpleHash usage
        run: |
          echo "Checking for insecure hash functions..."
          ! grep -rn "simpleHash\|Math\.random()" packages/ --include="*.ts" | grep -v "node_modules" | grep -v "__tests__" && echo "✅ No insecure patterns found"

      - name: Check for unsanitized dangerouslySetInnerHTML
        run: |
          echo "Checking for XSS vulnerabilities..."
          UNSAFE=$(grep -rn "dangerouslySetInnerHTML" apps/ --include="*.tsx" | grep -v "sanitizeHtml" | grep -v "node_modules" || true)
          if [ -n "$UNSAFE" ]; then
            echo "❌ Found unsanitized dangerouslySetInnerHTML:"
            echo "$UNSAFE"
            exit 1
          fi
          echo "✅ All dangerouslySetInnerHTML calls are sanitized"

  build-apps:
    name: Build Apps
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all apps
        run: |
          for app in email edocs enotes esheets eslides edb edrive econnect eforms esway eplanner launcher; do
            echo "Building $app..."
            cd apps/$app && pnpm build && cd ../..
          done

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-builds
          path: apps/*/dist/
          retention-days: 7

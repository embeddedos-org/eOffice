# Prometheus configuration for eOffice monitoring
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'eoffice-api'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['eoffice:3001']
        labels:
          service: 'eoffice-api'
          environment: 'staging'

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          service: 'node-exporter'

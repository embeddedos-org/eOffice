<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>eOffice Suite</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0f172a;--bg2:#1e293b;--bg3:#334155;--bg-hover:#2d3a4f;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;
  --accent:#60a5fa;--accent2:#3b82f6;--accent-dim:#1e3a5f;
  --green:#34d399;--green-dim:#064e3b;--orange:#fbbf24;--orange-dim:#78350f;
  --red:#f87171;--border:#334155;
  --radius:8px;--radius-sm:6px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
}
body{
  width:400px;height:500px;overflow-y:auto;overflow-x:hidden;
  font-family:var(--font);background:var(--bg);color:var(--text);
  font-size:13px;line-height:1.5;
}
body::-webkit-scrollbar{width:5px;}
body::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px;}

.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;border-bottom:1px solid var(--border);
  background:var(--bg2);position:sticky;top:0;z-index:10;
}
.header-left{display:flex;align-items:center;gap:10px;}
.logo{font-size:18px;font-weight:700;color:var(--accent);display:flex;align-items:center;gap:6px;}
.logo-icon{font-size:22px;}
.ebot-badge{
  display:inline-flex;align-items:center;gap:3px;
  padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;
  background:var(--green-dim);color:var(--green);
}
.ebot-badge.offline{background:rgba(248,113,113,0.15);color:var(--red);}
.header-right{display:flex;align-items:center;gap:6px;}
.icon-btn{
  width:28px;height:28px;border:none;border-radius:var(--radius-sm);
  background:transparent;color:var(--text2);font-size:14px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all 0.15s;
}
.icon-btn:hover{background:var(--bg3);color:var(--text);}

.search-bar{padding:10px 16px;}
.search-input{
  width:100%;padding:8px 12px 8px 32px;
  border:1px solid var(--border);border-radius:var(--radius);
  background:var(--bg2);color:var(--text);font-size:13px;
  outline:none;transition:border-color 0.15s;
  position:relative;
}
.search-input:focus{border-color:var(--accent);}
.search-wrap{position:relative;}
.search-icon{
  position:absolute;left:10px;top:50%;transform:translateY(-50%);
  color:var(--text3);font-size:13px;pointer-events:none;
}

.app-list{padding:4px 12px 8px;}
.app-item{
  display:flex;align-items:center;gap:12px;
  padding:10px 12px;border-radius:var(--radius);
  cursor:pointer;transition:all 0.15s;border:1px solid transparent;
}
.app-item:hover{background:var(--bg-hover);border-color:var(--border);}
.app-item:active{transform:scale(0.99);}
.app-icon{
  width:36px;height:36px;border-radius:var(--radius-sm);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;
}
.app-info{flex:1;min-width:0;}
.app-name{font-size:13px;font-weight:600;color:var(--text);}
.app-desc{font-size:11px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.app-badge{
  padding:2px 7px;border-radius:10px;font-size:9px;font-weight:700;
  text-transform:uppercase;letter-spacing:0.3px;flex-shrink:0;
}
.badge-offline{background:var(--green-dim);color:var(--green);}
.badge-online{background:var(--accent-dim);color:var(--accent);}
.badge-server{background:var(--orange-dim);color:var(--orange);}

.section-label{
  padding:8px 16px 4px;font-size:10px;font-weight:700;
  text-transform:uppercase;letter-spacing:0.8px;color:var(--text3);
}

.quick-actions{
  padding:8px 12px 12px;display:flex;gap:8px;
  border-top:1px solid var(--border);margin-top:4px;
}
.quick-btn{
  flex:1;display:flex;align-items:center;justify-content:center;gap:6px;
  padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius);
  background:var(--bg2);color:var(--text);font-size:12px;font-weight:600;
  cursor:pointer;transition:all 0.15s;font-family:var(--font);
}
.quick-btn:hover{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);}

.footer{
  padding:8px 16px;border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  font-size:10px;color:var(--text3);
}
.footer a{color:var(--text3);text-decoration:none;}
.footer a:hover{color:var(--accent);}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo"><span class="logo-icon">📎</span> eOffice Suite</div>
    <span class="ebot-badge" id="ebotBadge">🤖 eBot</span>
  </div>
  <div class="header-right">
    <button class="icon-btn" id="settingsBtn" title="Settings">⚙️</button>
  </div>
</div>

<div class="search-bar">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" class="search-input" id="searchInput" placeholder="Search apps..." autocomplete="off">
  </div>
</div>

<div class="section-label">Applications</div>
<div class="app-list" id="appList"></div>

<div class="section-label">🎮 EoSim Simulations</div>
<div class="app-list" id="simList"></div>

<div class="quick-actions">
  <button class="quick-btn" id="newDoc">📝 New Document</button>
  <button class="quick-btn" id="newNote">📒 New Note</button>
</div>

<div class="footer">
  <span>eOffice Suite v0.1.0</span>
  <a href="#" id="helpLink">Help & Docs</a>
</div>

<script>
(function() {
  'use strict';

  const APPS = [
    { id:'edocs',    icon:'📝', name:'eDocs',     desc:'Word processor',         badge:'offline', color:'#2563eb' },
    { id:'enotes',   icon:'📒', name:'eNotes',    desc:'Digital notebooks',       badge:'offline', color:'#059669' },
    { id:'esheets',  icon:'📊', name:'eSheets',   desc:'Spreadsheets',            badge:'offline', color:'#16a34a' },
    { id:'eslides',  icon:'📽️', name:'eSlides',   desc:'Presentations',           badge:'offline', color:'#dc2626' },
    { id:'email',    icon:'✉️', name:'eMail',     desc:'Email client',            badge:'offline', color:'#0891b2' },
    { id:'edb',      icon:'🗄️', name:'eDB',       desc:'Database manager',        badge:'offline', color:'#7c3aed' },
    { id:'edrive',   icon:'☁️', name:'eDrive',    desc:'Cloud file manager',      badge:'offline', color:'#2563eb' },
    { id:'econnect', icon:'💬', name:'eConnect',  desc:'Team messaging',          badge:'offline', color:'#0d9488' },
    { id:'eforms',   icon:'📋', name:'eForms',    desc:'Form builder & surveys',  badge:'offline', color:'#d97706' },
    { id:'esway',    icon:'🎨', name:'eSway',     desc:'Design canvas',           badge:'offline', color:'#e11d48' },
    { id:'eplanner', icon:'📅', name:'ePlanner',  desc:'Project planning',        badge:'offline', color:'#4f46e5' }
  ];

  const appList = document.getElementById('appList');
  const searchInput = document.getElementById('searchInput');
  const ebotBadge = document.getElementById('ebotBadge');

  function openApp(appId) {
    chrome.runtime.sendMessage({ type: 'openApp', app: appId });
    chrome.runtime.sendMessage({ type: 'updateRecent', app: appId });
    window.close();
  }

  function renderApps(filter) {
    const q = (filter || '').toLowerCase();
    const filtered = APPS.filter(a =>
      a.name.toLowerCase().includes(q) ||
      a.desc.toLowerCase().includes(q)
    );

    appList.innerHTML = '';
    if (filtered.length === 0) {
      appList.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text3);">No apps found</div>';
      return;
    }

    filtered.forEach(app => {
      const item = document.createElement('div');
      item.className = 'app-item';
      item.addEventListener('click', () => openApp(app.id));

      const badgeClass = app.badge === 'offline' ? 'badge-offline' :
                         app.badge === 'server' ? 'badge-server' : 'badge-online';
      const badgeText = app.badge === 'offline' ? 'Offline' :
                        app.badge === 'server' ? 'Server' : 'Online';

      item.innerHTML = `
        <div class="app-icon" style="background:${app.color}22;color:${app.color}">${app.icon}</div>
        <div class="app-info">
          <div class="app-name">${app.name}</div>
          <div class="app-desc">${app.desc}</div>
        </div>
        <span class="app-badge ${badgeClass}">${badgeText}</span>
      `;
      appList.appendChild(item);
    });
  }

  async function checkEbot() {
    try {
      const ctrl = new AbortController();
      const tid = setTimeout(() => ctrl.abort(), 2000);
      const res = await fetch('http://localhost:3001/api/ebot/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: 'ping', context: '' }),
        signal: ctrl.signal
      });
      clearTimeout(tid);
      if (res.ok) {
        ebotBadge.textContent = '🤖 eBot ✓';
        ebotBadge.classList.remove('offline');
      } else {
        throw new Error();
      }
    } catch {
      ebotBadge.textContent = '🤖 eBot ✗';
      ebotBadge.classList.add('offline');
    }
  }

  searchInput.addEventListener('input', () => renderApps(searchInput.value));

  document.getElementById('newDoc').addEventListener('click', () => openApp('edocs'));
  document.getElementById('newNote').addEventListener('click', () => openApp('enotes'));
  document.getElementById('settingsBtn').addEventListener('click', () => {
    chrome.runtime.openOptionsPage();
    window.close();
  });
  document.getElementById('helpLink').addEventListener('click', (e) => {
    e.preventDefault();
    chrome.tabs.create({ url: 'https://github.com/nicheOS/eOffice' });
    window.close();
  });

  renderApps();
  checkEbot();

  // EoSim Simulations
  const SIMS = [
    { id:'eosim-play', icon:'✈️', name:'Aircraft Sim', desc:'Fly a 3D aircraft — reuses EoSim renderer', color:'#0ea5e9', param:'aircraft' },
    { id:'eosim-play', icon:'🚗', name:'Car Sim',      desc:'Drive a vehicle — reuses EoSim renderer',  color:'#22c55e', param:'vehicle' },
    { id:'eosim-play', icon:'🚁', name:'Drone Sim',    desc:'Fly a quadrotor — reuses EoSim renderer',  color:'#a855f7', param:'drone' },
  ];
  const simList = document.getElementById('simList');
  SIMS.forEach(sim => {
    const item = document.createElement('div');
    item.className = 'app-item';
    item.addEventListener('click', () => {
      chrome.runtime.sendMessage({ type: 'openApp', app: sim.id });
      window.close();
    });
    item.innerHTML = `
      <div class="app-icon" style="background:${sim.color}22;color:${sim.color}">${sim.icon}</div>
      <div class="app-info">
        <div class="app-name">${sim.name}</div>
        <div class="app-desc">${sim.desc}</div>
      </div>
      <span class="app-badge badge-offline">Game</span>
    `;
    simList.appendChild(item);
  });
})();
</script>
</body>
</html>

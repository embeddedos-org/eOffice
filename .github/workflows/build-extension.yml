name: Build Browser Extension
on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "version=$(python3 -c "import json; print(json.load(open('extensions/browser/manifest.json'))['version'])")" >> $GITHUB_OUTPUT

      - name: Build extension zip
        run: |
          cd extensions/browser
          zip -r ../../eoffice-extension-v${{ steps.version.outputs.version }}.zip             manifest.json background.js popup.html options.html             apps/ icons/             -x "*.DS_Store" "updates.xml"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: eoffice-extension-v${{ steps.version.outputs.version }}
          path: eoffice-extension-*.zip

      - name: Upload to S3 (if configured)
        if: secrets.AWS_ACCESS_KEY_ID != ''
        run: |
          aws s3 cp eoffice-extension-v${{ steps.version.outputs.version }}.zip             s3://${{ secrets.EOFFICE_S3_BUCKET }}/extension/eoffice-extension-latest.crx
          aws s3 cp extensions/browser/updates.xml             s3://${{ secrets.EOFFICE_S3_BUCKET }}/extension/updates.xml
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.EOFFICE_S3_REGION }}
